<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="calc-container">
    <input type="text" id="expression" class="calc-input" placeholder="Enter Expression...">
    <button id="calculate" class="calc-btn">Calculate</button>

    <div id="result-box">
        <h3>Result:</h3>
        <p id="result">--</p>
    </div>

    <h3>History</h3>
    <div id="history"></div>
</div>

<script src="script.js"></script>
</body>
</html>
